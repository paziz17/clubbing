name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

# NOTE: This pipeline deploys the Clubbing Next.js app (CRM + APP servers).
# The marketing/consumer site (clubbing.co.il / WEB server) is a SEPARATE
# project deployed via its own rsync-based `website/deploy.sh`, so it is
# intentionally NOT part of this workflow.

jobs:
  # ─── Stage 1: Quality Checks ────────────────────────────────────────────────
  checks:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

      # Lint is advisory only — ESLint is not configured with a blocking ruleset
      # in this repo, so it must never gate a deploy. TypeScript is the real gate.
      - name: Run ESLint (advisory)
        continue-on-error: true
        run: npm run lint

  # ─── Stage 2: Deploy to Production (CRM + APP) ──────────────────────────────
  deploy:
    name: Deploy to production servers
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: il-central-1

      - name: Deploy CRM (i-07305ce7425865c83)
        run: |
          CMD_ID=$(aws ssm send-command \
            --region il-central-1 \
            --instance-ids i-07305ce7425865c83 \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo -u ubuntu /home/ubuntu/ssm-deploy.sh"]}' \
            --query 'Command.CommandId' --output text)
          echo "CRM deploy: $CMD_ID"
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id i-07305ce7425865c83 --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] CRM status: $STATUS"
            if [ "$STATUS" = "Success" ]; then break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id i-07305ce7425865c83 --query '{Status:Status,Error:StandardErrorContent}' --output table
              exit 1
            fi
            sleep 10
          done

      - name: Deploy App (i-075649e10e9cdd7ea)
        run: |
          CMD_ID=$(aws ssm send-command \
            --region il-central-1 \
            --instance-ids i-075649e10e9cdd7ea \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo -u ubuntu /home/ubuntu/ssm-deploy.sh"]}' \
            --query 'Command.CommandId' --output text)
          echo "APP deploy: $CMD_ID"
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id i-075649e10e9cdd7ea --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] APP status: $STATUS"
            if [ "$STATUS" = "Success" ]; then break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id i-075649e10e9cdd7ea --query '{Status:Status,Error:StandardErrorContent}' --output table
              exit 1
            fi
            sleep 10
          done

      # ─── Stage 3: Health Checks ───────────────────────────────────────────
      - name: Health check — APP
        run: |
          echo "Waiting 20s for app to warm up..."
          sleep 20
          for i in 1 2 3; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 https://app.clubbing.co.il/ 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $HTTP"
            if [ "$HTTP" = "200" ] || [ "$HTTP" = "307" ] || [ "$HTTP" = "302" ]; then
              echo "APP health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "APP health check FAILED"
          exit 1

      - name: Health check — CRM
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 https://crm.clubbing.co.il/ 2>/dev/null || echo "000")
          echo "CRM HTTP $HTTP"
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "307" ] || [ "$HTTP" = "302" ]; then
            echo "CRM health check passed"
          else
            echo "CRM health check FAILED (HTTP $HTTP)"
            exit 1
          fi

  # ─── Stage 4: Rollback on failure ───────────────────────────────────────────
  rollback:
    name: Rollback on failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: il-central-1

      - name: Rollback CRM
        run: |
          echo "Rolling back CRM..."
          aws ssm send-command \
            --region il-central-1 \
            --instance-ids i-07305ce7425865c83 \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo -u ubuntu bash -lc \"cd /home/ubuntu/app && git checkout HEAD~1 && pm2 restart all --update-env && echo ROLLBACK_DONE\""]}' \
            --query 'Command.CommandId' --output text

      - name: Rollback App
        run: |
          echo "Rolling back APP..."
          aws ssm send-command \
            --region il-central-1 \
            --instance-ids i-075649e10e9cdd7ea \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo -u ubuntu bash -lc \"cd /home/ubuntu/app && git checkout HEAD~1 && pm2 restart all --update-env && echo ROLLBACK_DONE\""]}' \
            --query 'Command.CommandId' --output text

      - name: Notify rollback
        run: |
          echo "::error::Deploy FAILED — automatic rollback triggered on CRM + APP"
          exit 1
