name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to all production servers
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: il-central-1

      - name: Deploy CRM (i-07305ce7425865c83)
        run: |
          CMD_ID=$(aws ssm send-command \
            --region il-central-1 \
            --instance-ids i-07305ce7425865c83 \
            --document-name "AWS-RunShellScript" \
            --parameters commands=["sudo -u ubuntu /home/ubuntu/ssm-deploy.sh"] \
            --query 'Command.CommandId' --output text)
          echo "CRM deploy: $CMD_ID"
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id i-07305ce7425865c83 --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] CRM status: $STATUS"
            if [ "$STATUS" = "Success" ]; then break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id i-07305ce7425865c83 --query '{Status:Status,Error:StandardErrorContent}' --output table
              exit 1
            fi
            sleep 10
          done
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id i-07305ce7425865c83 \
            --query '{Status:Status,Output:StandardOutputContent}' --output table

      - name: Deploy App (i-075649e10e9cdd7ea)
        run: |
          CMD_ID=$(aws ssm send-command \
            --region il-central-1 \
            --instance-ids i-075649e10e9cdd7ea \
            --document-name "AWS-RunShellScript" \
            --parameters commands=["sudo -u ubuntu /home/ubuntu/ssm-deploy.sh"] \
            --query 'Command.CommandId' --output text)
          echo "APP deploy: $CMD_ID"
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id i-075649e10e9cdd7ea --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] APP status: $STATUS"
            if [ "$STATUS" = "Success" ]; then break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id i-075649e10e9cdd7ea --query '{Status:Status,Error:StandardErrorContent}' --output table
              exit 1
            fi
            sleep 10
          done
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id i-075649e10e9cdd7ea \
            --query '{Status:Status,Output:StandardOutputContent}' --output table

      - name: Deploy Website (i-0a0702e0d5c0c118f)
        run: |
          CMD_ID=$(aws ssm send-command \
            --region il-central-1 \
            --instance-ids i-0a0702e0d5c0c118f \
            --document-name "AWS-RunShellScript" \
            --parameters commands=["sudo -u ubuntu /home/ubuntu/ssm-deploy.sh"] \
            --query 'Command.CommandId' --output text)
          echo "WEB deploy: $CMD_ID"
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id i-0a0702e0d5c0c118f --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] WEB status: $STATUS"
            if [ "$STATUS" = "Success" ]; then break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id i-0a0702e0d5c0c118f --query '{Status:Status,Error:StandardErrorContent}' --output table
              exit 1
            fi
            sleep 10
          done
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id i-0a0702e0d5c0c118f \
            --query '{Status:Status,Output:StandardOutputContent}' --output table
