name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy-crm:
    name: Deploy CRM (51.16.173.19)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 51.16.173.19
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/app
            git pull origin main
            bash /home/ubuntu/deploy.sh

  deploy-app:
    name: Deploy App (16.164.48.68)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 16.164.48.68
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/app
            git pull origin main
            bash /home/ubuntu/deploy.sh

  deploy-web:
    name: Deploy Website (51.85.29.74)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 51.85.29.74
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/website
            git pull origin main
            bash /home/ubuntu/deploy.sh
