name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  checks:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

      # Advisory only — ESLint has no blocking ruleset here; TypeScript is the gate.
      - name: Run ESLint (advisory)
        continue-on-error: true
        run: npm run lint

  deploy-staging:
    name: Deploy to Staging (51.84.188.55)
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 51.84.188.55
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/app
            PREV_COMMIT=$(git rev-parse HEAD)
            echo "Previous commit: $PREV_COMMIT"
            git pull origin staging
            npm ci --prefer-offline
            NODE_OPTIONS='--max-old-space-size=1536' npm run build
            pm2 restart clubbing-staging --update-env || pm2 start npm --name "clubbing-staging" -- start -- -p 3000
            pm2 save
            echo "Deploy done, new commit: $(git rev-parse HEAD)"

      - name: Health check — Staging
        run: |
          sleep 15
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 15 https://staging.clubbing.co.il/ 2>/dev/null || echo "000")
          echo "Staging HTTP $HTTP"
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "307" ] || [ "$HTTP" = "302" ]; then
            echo "Staging health check passed"
          else
            echo "Staging health check FAILED (HTTP $HTTP)"
            exit 1
          fi
