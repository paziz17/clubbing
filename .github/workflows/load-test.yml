name: Load Test

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target URL to test'
        required: true
        default: 'https://app.clubbing.co.il'
      vus:
        description: 'Number of virtual users'
        required: true
        default: '100'
      duration:
        description: 'Test duration (e.g. 30s, 2m)'
        required: true
        default: '60s'

jobs:
  load-test:
    name: k6 Load Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6

      - name: Run k6 load test
        run: |
          cat > /tmp/load-test.js << 'EOF'
          import http from 'k6/http';
          import { check, sleep } from 'k6';
          import { Rate, Trend } from 'k6/metrics';

          const errorRate = new Rate('errors');
          const responseTime = new Trend('response_time', true);

          export const options = {
            stages: [
              { duration: '30s', target: __ENV.VUS / 4 },    // Ramp up slowly
              { duration: __ENV.DURATION, target: __ENV.VUS }, // Hold at target
              { duration: '20s', target: 0 },                  // Ramp down
            ],
            thresholds: {
              http_req_duration: ['p(95)<3000'],   // 95% of requests under 3s
              http_req_failed: ['rate<0.05'],       // Less than 5% errors
              errors: ['rate<0.05'],
            },
          };

          export default function () {
            const BASE = __ENV.TARGET;
            const pages = ['/', '/events', '/login'];
            const page = pages[Math.floor(Math.random() * pages.length)];

            const res = http.get(`${BASE}${page}`, {
              timeout: '10s',
              headers: { 'Accept': 'text/html' },
            });

            const ok = check(res, {
              'status is 200/302/307': (r) => [200, 302, 307].includes(r.status),
              'response time < 3s': (r) => r.timings.duration < 3000,
            });

            errorRate.add(!ok);
            responseTime.add(res.timings.duration);
            sleep(Math.random() * 2 + 0.5);
          }
          EOF

          k6 run \
            -e TARGET="${{ github.event.inputs.target }}" \
            -e VUS="${{ github.event.inputs.vus }}" \
            -e DURATION="${{ github.event.inputs.duration }}" \
            --out json=/tmp/k6-results.json \
            /tmp/load-test.js

      - name: Parse and display results
        if: always()
        run: |
          if [ -f /tmp/k6-results.json ]; then
            echo "=== Load Test Summary ==="
            python3 - << 'PYEOF'
          import json, sys

          metrics = {}
          with open('/tmp/k6-results.json') as f:
            for line in f:
              try:
                d = json.loads(line)
                if d.get('type') == 'Point':
                  m = d['metric']
                  v = d['data']['value']
                  if m not in metrics:
                    metrics[m] = []
                  metrics[m].append(v)
              except:
                pass

          def p(vals, pct):
            if not vals: return 0
            vals = sorted(vals)
            i = int(len(vals) * pct / 100)
            return vals[min(i, len(vals)-1)]

          dur = metrics.get('http_req_duration', [])
          failed = metrics.get('http_req_failed', [])
          reqs = metrics.get('http_reqs', [])

          total_reqs = len(dur)
          err_rate = sum(failed) / len(failed) * 100 if failed else 0

          print(f"Total requests:   {total_reqs}")
          print(f"Error rate:       {err_rate:.2f}%")
          if dur:
            print(f"Avg response:     {sum(dur)/len(dur):.0f}ms")
            print(f"P50 response:     {p(dur,50):.0f}ms")
            print(f"P95 response:     {p(dur,95):.0f}ms")
            print(f"P99 response:     {p(dur,99):.0f}ms")
            print(f"Max response:     {max(dur):.0f}ms")
          PYEOF
          fi
