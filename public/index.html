<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>CLUBBING</title>
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #06060A;
      color: #E8DEC2;
      font-family: -apple-system, "SF Pro", system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ring {
      width: 56px;
      height: 56px;
      border: 3px solid #C9A24A;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .box { text-align: center; }
    .brand { font-family: Cinzel, serif; font-size: 28px; letter-spacing: 4px; color: #C9A24A; }
    .hint { margin-top: 8px; font-size: 12px; color: #918876; }
  </style>
</head>
<body>
  <div class="box">
    <div class="ring"></div>
    <div class="brand">CLUBBING</div>
    <div class="hint">מתחבר לשרת המקומי…</div>
  </div>
  <script>
    // Fallback only — Capacitor server.url overrides this in dev/prod.
    setTimeout(() => {
      if (location.protocol.startsWith("http")) {
        location.href = "/";
      }
    }, 1500);
  </script>
</body>
</html>
